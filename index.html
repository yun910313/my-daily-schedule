<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 我的時光進度表</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --download-color: #a855f7;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        /* 日期選擇器樣式 */
        .date-selector {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 1px solid var(--accent-color);
        }

        input[type="date"] {
            background: #0f172a;
            color: white;
            border: 1px solid var(--accent-color);
            padding: 8px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        button {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button.reset-btn {
            background: #ef4444;
            color: white;
        }

        button.download-btn {
            background: var(--download-color);
            color: white;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .section.completed {
            border-color: var(--success-color);
            background: rgba(74, 222, 128, 0.05);
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .checkbox.checked {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .checkbox.checked::after {
            content: '✓';
            color: #0f172a;
            font-weight: bold;
        }

        .time-tag {
            background: var(--accent-color);
            color: #0f172a;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            flex-grow: 1;
        }

        .detail-list {
            font-size: 0.9rem;
            color: #94a3b8;
            margin: 8px 0 8px 45px;
            white-space: pre-line;
        }

        .notes-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            margin-top: 15px;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
        }

        footer {
            margin-top: 40px;
            opacity: 0.5;
            font-size: 0.8rem;
            text-align: center;
        }

        /* 列印優化 */
        @media print {

            .date-selector,
            .controls,
            footer {
                display: none !important;
            }

            body {
                background: white;
                color: black;
            }

            .section {
                border: 1px dotted #ccc !important;
                background: white !important;
                color: black !important;
            }

            .notes-area {
                border: none !important;
                color: black !important;
                background: transparent !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>🧠 我的時光進度表</h1>
        </header>

        <div class="date-selector">
            <span>📅 查看日期：</span>
            <input type="date" id="date-picker" onchange="changeDate()">
        </div>

        <div class="controls">
            <button class="reset-btn" onclick="resetDay()">🧹 清除這天</button>
            <button class="download-btn" onclick="downloadPDF()">📥 下載 PDF 戰報</button>
        </div>

        <div id="schedule-container"></div>

        <footer>
            Data is stored by date in your browser. ✨
        </footer>
    </div>

    <script>
        const scheduleData = [
            { id: 'start', time: '09:00', title: '🌅 起床＋啟動', desc: '• 整理、早餐\n• 不滑手機\n• 定目標' },
            { id: 'job', time: '10:00–12:00', title: '💼 求職主力', desc: '• 投履歷、LinkedIn\n• 回覆面試、查資料' },
            { id: 'lunch', time: '12:00–13:30', title: '🍱 午休', desc: '• 出門走走' },
            { id: 'skill', time: '13:30–16:00', title: '📚 技能升級', desc: '• 線上課、作品集' },
            { id: 'network', time: '16:00–17:00', title: '☕ 輕鬆經營', desc: '• 人脈、整理紀錄' },
            { id: 'sport', time: '17:30–18:30', title: '🏃 運動', desc: '• 健身散步、趕走 emo' },
            { id: 'night', time: '20:00–22:00', title: '🌙 彈性時間', desc: '• 準備面試、放鬆' }
        ];

        // 初始化日期為今天
        let selectedDate = new Date().toISOString().split('T')[0];
        document.getElementById('date-picker').value = selectedDate;

        function changeDate() {
            selectedDate = document.getElementById('date-picker').value;
            renderSchedule();
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            scheduleData.forEach(item => {
                // 用 "日期_id" 當作 Key
                const key = `${selectedDate}_${item.id}`;
                const savedStatus = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };

                const section = document.createElement('div');
                section.className = `section ${savedStatus.checked ? 'completed' : ''}`;
                section.innerHTML = `
                    <div class="header-row">
                        <div class="checkbox ${savedStatus.checked ? 'checked' : ''}" onclick="toggleCheck('${item.id}')"></div>
                        <span class="time-tag">${item.time}</span>
                        <div class="title">${item.title}</div>
                    </div>
                    <div class="detail-list">${item.desc}</div>
                    <textarea class="notes-area" 
                        id="note-${item.id}"
                        placeholder="那天的紀錄..." 
                        oninput="saveNote('${item.id}', this.value)">${savedStatus.note}</textarea>
                `;
                container.appendChild(section);
            });
        }

        function toggleCheck(id) {
            const key = `${selectedDate}_${id}`;
            const status = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };
            status.checked = !status.checked;
            localStorage.setItem(key, JSON.stringify(status));
            renderSchedule();
        }

        function saveNote(id, value) {
            const key = `${selectedDate}_${id}`;
            const status = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };
            status.note = value;
            localStorage.setItem(key, JSON.stringify(status));
        }

        function resetDay() {
            if (confirm(`確定要清除 ${selectedDate} 的紀錄嗎？`)) {
                scheduleData.forEach(item => {
                    localStorage.removeItem(`${selectedDate}_${item.id}`);
                });
                renderSchedule();
            }
        }

        function downloadPDF() {
            window.print();
        }

        renderSchedule();
    </script>
</body>

</html>
