<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📅 妳的專屬時光看板</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --danger-color: #ef4444;
        }

        /* 基礎設定 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 漢堡按鈕 (Mobile Only) --- */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        /* --- 主內容區 --- */
        .main-content {
            flex-grow: 1;
            margin-left: 320px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            width: 100%;
        }

        .content-container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 2rem;
            color: var(--accent-color);
        }

        /* --- 日曆樣式 --- */
        .calendar-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-label {
            font-size: 0.75rem;
            color: #94a3b8;
            padding-bottom: 5px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .day-cell:hover {
            background: rgba(56, 189, 248, 0.15);
        }

        .day-cell.selected {
            background: var(--accent-color);
            color: #0f172a;
            font-weight: 800;
        }

        .day-cell.today {
            outline: 2px solid var(--success-color);
            outline-offset: -2px;
        }

        /* --- 行程卡片 --- */
        .section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section.completed {
            border-color: var(--success-color);
            background: rgba(74, 222, 128, 0.03);
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* 加大 Checkbox 點擊區域 */
        .checkbox-wrapper {
            padding: 5px;
            cursor: pointer;
        }

        .checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .checkbox.checked {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .checkbox.checked::after {
            content: '✓';
            color: #0f172a;
            font-weight: 900;
        }

        .time-tag {
            background: var(--accent-color);
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .item-title {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .notes-area {
            width: 100%;
            min-height: 80px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            margin-top: 1rem;
            font-size: 1rem;
            line-height: 1.5;
            outline: none;
        }

        .notes-area:focus {
            border-color: var(--accent-color);
        }

        /* 按鈕組 */
        .btn-group {
            margin-top: auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        button.action-btn {
            border: none;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .print-btn {
            background: #a855f7;
            color: white;
        }

        .reset-btn {
            background: var(--danger-color);
            color: white;
            opacity: 0.9;
        }

        /* --- 響應式調整 --- */
        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
            }

            .main-content {
                margin-left: 280px;
            }
        }

        @media (max-width: 992px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
                width: 300px;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .overlay.active {
                display: block;
            }

            .main-content {
                margin-left: 0;
                padding: 5rem 1rem 2rem 1rem;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
            }
        }

        @media print {

            .sidebar,
            .menu-toggle,
            .overlay {
                display: none !important;
            }

            body {
                background: white !important;
                color: black !important;
                display: block;
            }

            .main-content {
                margin: 0;
                padding: 0;
                width: 100%;
            }

            .section {
                border: 1px solid #ddd !important;
                background: white !important;
                page-break-inside: avoid;
            }

            .notes-area {
                color: black !important;
                background: transparent !important;
                border: none !important;
            }
        }
    </style>
</head>

<body>

    <button class="menu-toggle" onclick="toggleMenu()" aria-label="開啟選單">☰ 選單</button>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
            <span>📅</span> 時光看板
        </h2>

        <div class="calendar-card">
            <div class="calendar-header">
                <button onclick="prevMonth()"
                    style="background:none; border:none; color:white; cursor:pointer; padding:10px;">&lt;</button>
                <span id="month-year-label"></span>
                <button onclick="nextMonth()"
                    style="background:none; border:none; color:white; cursor:pointer; padding:10px;">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="btn-group">
            <button class="action-btn print-btn" onclick="window.print()">📥 匯出 PDF</button>
            <button class="action-btn reset-btn" onclick="resetDay()">🧹 清除紀錄</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-container">
            <h1 id="display-date">載入中...</h1>
            <div id="schedule-container"></div>
        </div>
    </main>

    <script>
        const scheduleData = [
            { id: 'start', time: '09:00', title: '🌅 起床＋啟動' },
            { id: 'job', time: '10:00', title: '💼 求職主力時段' },
            { id: 'lunch', time: '12:00', title: '🍱 午休放鬆' },
            { id: 'skill', time: '13:30', title: '📚 技能升級時段' },
            { id: 'sport', time: '17:30', title: '🏃 運動 / 散步' }
        ];

        let currentNavDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const label = document.getElementById('month-year-label');
            grid.innerHTML = '';
            const year = currentNavDate.getFullYear();
            const month = currentNavDate.getMonth();
            label.innerText = `${year} / ${month + 1}`;

            ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
                const el = document.createElement('div');
                el.className = 'day-label'; el.innerText = d;
                grid.appendChild(el);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = `day-cell ${dateStr === selectedDateStr ? 'selected' : ''}`;
                if (dateStr === new Date().toISOString().split('T')[0]) cell.classList.add('today');
                cell.innerText = d;
                cell.onclick = () => {
                    selectedDateStr = dateStr;
                    renderCalendar();
                    renderSchedule();
                    if (window.innerWidth <= 992) toggleMenu();
                };
                grid.appendChild(cell);
            }
        }

        function renderSchedule() {
            document.getElementById('display-date').innerText = `📅 ${selectedDateStr}`;
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            scheduleData.forEach(item => {
                const key = `${selectedDateStr}_${item.id}`;
                const data = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };
                const section = document.createElement('div');
                section.className = `section ${data.checked ? 'completed' : ''}`;
                section.innerHTML = `
                    <div class="header-row">
                        <div class="checkbox-wrapper" onclick="toggleCheck('${item.id}')">
                            <div class="checkbox ${data.checked ? 'checked' : ''}"></div>
                        </div>
                        <span class="time-tag">${item.time}</span>
                        <span class="item-title">${item.title}</span>
                    </div>
                    <textarea class="notes-area" placeholder="紀錄今天的點滴..." oninput="saveNote('${item.id}', this.value)">${data.note}</textarea>
                `;
                container.appendChild(section);
            });
        }

        function toggleCheck(id) {
            const key = `${selectedDateStr}_${id}`;
            const data = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };
            data.checked = !data.checked;
            localStorage.setItem(key, JSON.stringify(data));
            renderSchedule();
        }

        function saveNote(id, val) {
            const key = `${selectedDateStr}_${id}`;
            const data = JSON.parse(localStorage.getItem(key)) || { checked: false, note: '' };
            data.note = val;
            localStorage.setItem(key, JSON.stringify(data));
        }

        function prevMonth() { currentNavDate.setMonth(currentNavDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentNavDate.setMonth(currentNavDate.getMonth() + 1); renderCalendar(); }
        function resetDay() {
            if (confirm(`確定清除 ${selectedDateStr} 紀錄？`)) {
                scheduleData.forEach(item => localStorage.removeItem(`${selectedDateStr}_${item.id}`));
                renderSchedule();
            }
        }

        renderCalendar();
        renderSchedule();
    </script>
</body>

</html>
